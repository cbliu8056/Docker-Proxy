name: Sync Docker Image to ACR

# 支持手动触发和定时触发
on:
  workflow_dispatch:
    inputs:
      image:       # 镜像全名，例如 markoshust/magento-php:8.3-fpm-4
        description: 'Docker image to pull from Docker Hub'
        required: true
        default: 'markoshust/magento-php:8.3-fpm-4'
  schedule:
    - cron: '0 3 * * *' # 可选，每天凌晨自动同步

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Set Docker image
        run: echo "IMAGE=${{ github.event.inputs.image }}" >> $GITHUB_ENV

      - name: Pull image from Docker Hub
        run: |
          echo "Pulling $IMAGE..."
          docker pull $IMAGE

      - name: Login to Aliyun ACR
        run: |
          docker login ${{ secrets.ALI_REGISTRY }} \
            -u ${{ secrets.ALI_USERNAME }} \
            -p ${{ secrets.ALI_PASSWORD }}

      - name: Tag image for ACR
        run: |
          IMAGE_NAME=$(echo $IMAGE | awk -F ':' '{print $1}' | sed 's/\//-/g')
          TAG=$(echo $IMAGE | awk -F ':' '{print $2}')
          docker tag $IMAGE crpi-bjz4kedi811densl.cn-hangzhou.personal.cr.aliyuncs.com/cool8056/$IMAGE_NAME:$TAG
          echo "TAGGED_IMAGE=crpi-bjz4kedi811densl.cn-hangzhou.personal.cr.aliyuncs.com/cool8056/$IMAGE_NAME:$TAG" >> $GITHUB_ENV

      - name: Push image to ACR
        run: |
          docker push $TAGGED_IMAGE

      - name: Generate docker pull command for customer
        run: |
          CLIENT_PULL="crpi-bjz4kedi811densl.cn-hangzhou.personal.cr.aliyuncs.com/cool8056/$IMAGE_NAME:$TAG"
          CLIENT_TAG=$(echo $IMAGE | awk -F '/' '{print $2}')  # 去掉命名空间
          echo "客户 pull 命令: docker pull $CLIENT_PULL"
          echo "客户 tag 命令:  docker tag $CLIENT_PULL $CLIENT_TAG"
          echo "客户删除镜像命令: docker rmi $CLIENT_PULL"