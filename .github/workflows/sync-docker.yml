name: Sync Docker Image to ACR

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Docker image to pull from Docker Hub'
        required: true
        default: 'markoshust/magento-opensearch:2.12-0'
  schedule:
    - cron: '0 3 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Set Docker image
        run: echo "IMAGE=${{ github.event.inputs.image }}" >> $GITHUB_ENV

      - name: Pull image from Docker Hub
        run: |
          echo "Pulling $IMAGE..."
          docker pull $IMAGE
        shell: bash
        env:
          IMAGE: ${{ github.event.inputs.image }}

      - name: Login to Aliyun ACR
        run: |
          echo "Logging in to Aliyun ACR..."
          docker login $ALI_REGISTRY \
            -u $ALI_USERNAME \
            -p $ALI_PASSWORD
        shell: bash
        env:
          ALI_REGISTRY: ${{ secrets.ALI_REGISTRY }}
          ALI_USERNAME: ${{ secrets.ALI_USERNAME }}
          ALI_PASSWORD: ${{ secrets.ALI_PASSWORD }}

      - name: Tag image for ACR
        run: |
          # 使用原始镜像层级，保持 Docker Hub 名字
          IMAGE_NAME=$(echo $IMAGE | awk -F '/' '{print $NF}' | awk -F ':' '{print $1}')
          TAG=$(echo $IMAGE | awk -F ':' '{print $2}')
          ACR_IMAGE="$ALI_REGISTRY/$ALI_NAMESPACE/$IMAGE_NAME:$TAG"

          echo "Tagging $IMAGE -> $ACR_IMAGE"
          docker tag $IMAGE $ACR_IMAGE
          echo "TAGGED_IMAGE=$ACR_IMAGE" >> $GITHUB_ENV
        shell: bash
        env:
          IMAGE: ${{ github.event.inputs.image }}
          ALI_REGISTRY: ${{ secrets.ALI_REGISTRY }}
          ALI_NAMESPACE: ${{ secrets.ALI_NAMESPACE }}

      - name: Push image to ACR
        run: |
          echo "Pushing $TAGGED_IMAGE to ACR..."
          docker push $TAGGED_IMAGE
        shell: bash
        env:
          TAGGED_IMAGE: ${{ env.TAGGED_IMAGE }}

      - name: Generate client commands
        run: |
          CLIENT_PULL="$TAGGED_IMAGE"
          CLIENT_TAG=$(echo $IMAGE | awk -F '/' '{print $NF}')  # 取 Docker Hub 镜像名
          echo "客户 pull 命令: docker pull $CLIENT_PULL"
          echo "客户 tag 命令:  docker tag $CLIENT_PULL $CLIENT_TAG"
          echo "客户删除镜像命令: docker rmi $CLIENT_PULL"
        shell: bash
        env:
          IMAGE: ${{ github.event.inputs.image }}
          TAGGED_IMAGE: ${{ env.TAGGED_IMAGE }}