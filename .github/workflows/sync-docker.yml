name: Sync Docker Image to ACR

# 支持手动触发和定时触发
on:
  workflow_dispatch:
    inputs:
      image:       # 镜像全名，例如 markoshust/magento-php:8.3-fpm-4
        description: 'Docker image to pull from Docker Hub'
        required: true
        default: 'markoshust/magento-php:8.3-fpm-4'
  schedule:
    - cron: '0 3 * * *' # 可选，每天凌晨自动同步

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Set Docker image
        run: echo "IMAGE=${{ github.event.inputs.image }}" >> $GITHUB_ENV

      - name: Pull image from Docker Hub
        run: |
          echo "Pulling $IMAGE..."
          docker pull $IMAGE

      - name: Login to Aliyun ACR
        run: |
          docker login ${{ secrets.ALI_REGISTRY }} \
            -u ${{ secrets.ALI_USERNAME }} \
            -p ${{ secrets.ALI_PASSWORD }}

      - name: Tag image for ACR
        run: |
          ALI_REGISTRY=${{ secrets.ALI_REGISTRY }}
          ALI_NAMESPACE=${{ secrets.ALI_NAMESPACE }}
          REPO=$(echo $IMAGE | awk -F ':' '{print $1}')
          REPO_FLAT=$(echo $REPO | sed 's#/#-#g')
          TAG=$(echo $IMAGE | awk -F ':' '{print $2}')
          # 防止没有 tag
          if [ -z "$TAG" ]; then
            TAG="latest"
          fi
          ACR_IMAGE="$ALI_REGISTRY/$ALI_NAMESPACE/$REPO_FLAT:$TAG"
          docker tag $IMAGE $ACR_IMAGE
          echo "TAGGED_IMAGE=$ACR_IMAGE" >> $GITHUB_ENV

      - name: Push image to ACR
        run: |
          docker push $TAGGED_IMAGE

      - name: Generate docker commands
        run: |
          CLIENT_PULL="$TAGGED_IMAGE"
          CLIENT_TAG=$(echo $IMAGE | awk -F '/' '{print $NF}')
          echo "docker pull $CLIENT_PULL"
          echo "docker tag $CLIENT_PULL $CLIENT_TAG"
          echo "docker rmi $CLIENT_PULL"
        env:
          IMAGE: ${{ env.IMAGE }}
          TAGGED_IMAGE: ${{ env.TAGGED_IMAGE }}